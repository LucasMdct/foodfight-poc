</style>
</helmet>

<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:180,&quot;height&quot;:220},&quot;who&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;alface&quot;,&quot;feijao&quot;,&quot;arroz&quot;,&quot;vilao&quot;],&quot;default&quot;:&quot;alface&quot;,&quot;tsType&quot;:&quot;'alface'|'feijao'|'arroz'|'vilao'&quot;,&quot;section&quot;:&quot;Personagem&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const who = this.props.who ?? 'alface';
    return {
      isAlface: who === 'alface',
      isFeijao: who === 'feijao',
      isArroz: who === 'arroz',
      isVilao: who === 'vilao',
    };
  }
}
</script>
